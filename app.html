<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SwipeLearn</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;background:#0a0a0a}
body{min-height:100%;background:#0a0a0a;color:#fff;font-family:'Source Sans 3',sans-serif;-webkit-tap-highlight-color:transparent}
#root{min-height:100%}
button,input,textarea{touch-action:manipulation;-webkit-tap-highlight-color:transparent;font-family:inherit}
input,textarea{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;border-radius:10px;padding:10px 12px;font-size:13px;outline:none}
input:focus,textarea:focus{border-color:rgba(255,255,255,0.3)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeout{0%,60%{opacity:1}100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>
<div id="root"></div>
<script src="data/cards.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const h=React.createElement,{useState,useEffect,useRef,useCallback}=React;
const ST='max(16px,env(safe-area-inset-top,16px))',SB='env(safe-area-inset-bottom,16px)';
function LS(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k));localStorage.setItem(k,JSON.stringify(v))}catch{return null}}
function getKey(){try{return localStorage.getItem('sl_api')||''}catch{return''}}
function setKey(k){try{localStorage.setItem('sl_api',k)}catch{}}

const DEF_CATS=[
  {id:"excel",label:"Excel",sublabel:"Формулы, функции, лайфхаки",type:"tech",icon:"icons/excel.svg"},
  {id:"vba",label:"VBA",sublabel:"Макросы и автоматизация",type:"tech",icon:"icons/vba.svg"},
  {id:"addin",label:"Add-In",sublabel:"Надстройки Excel/Office",type:"tech",icon:"icons/addin.svg"},
  {id:"german",label:"Deutsch",sublabel:"Словарь и грамматика",type:"lang",icon:"icons/german.svg"},
  {id:"english",label:"English",sublabel:"Vocabulary & Grammar",type:"lang",icon:"icons/english.svg"},
  {id:"japanese",label:"\u65E5\u672C\u8A9E",sublabel:"Словарь и грамматика",type:"lang",icon:"icons/japanese.svg"},
  {id:"ib",label:"Investment Banking",sublabel:"IB знания и термины",type:"finance",icon:"icons/ib.svg"},
  {id:"pe",label:"Private Equity",sublabel:"PE фонды и стратегии",type:"finance",icon:"icons/pe.svg"},
  {id:"cb",label:"Commercial Banking",sublabel:"Банковское дело",type:"finance",icon:"icons/cb.svg"},
];
const DIFF=[{id:1,label:"Начальный",color:"#4ade80"},{id:2,label:"Базовый",color:"#60a5fa"},{id:3,label:"Средний",color:"#f59e0b"},{id:4,label:"Продвинутый",color:"#f97316"},{id:5,label:"Экспертный",color:"#ef4444"}];
const DP={excel:l=>`Ты — преподаватель Excel. Карточка уровня ${l}/5 на РУССКОМ. Ответь СТРОГО JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,vba:l=>`Ты — преподаватель VBA. Карточка уровня ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,addin:l=>`Ты — эксперт надстроек Excel. Карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,german:l=>`Преподаватель немецкого. Карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,english:l=>`Преподаватель английского. Карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,japanese:l=>`Преподаватель японского. Карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,ib:l=>`Инвестиционный банкир. Карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,pe:l=>`Специалист PE. Карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,cb:l=>`Эксперт Commercial Banking. Карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`};

function getPrompt(id,l,cc){if(DP[id])return DP[id](l);const c=(cc||[]).find(x=>x.id===id);return c?`Ты — эксперт "${c.label}". ${c.sublabel}. Карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`:null}
function parseCard(t){try{return JSON.parse(t.replace(/```json\s*/g,'').replace(/```/g,'').trim())}catch{const m=t.match(/\{[\s\S]*\}/);if(m)try{return JSON.parse(m[0])}catch{}return null}}
async function fetchCard(id,l,cc){const p=getPrompt(id,l,cc);if(!p)return null;const k=getKey();if(!k)return null;try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:p}]})});const d=await r.json();if(d.error)throw Error(d.error.message);return parseCard(d.content?.map(b=>b.text||'').join('')||'')}catch(e){console.error('API:',e);return null}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function getLocal(id,l){const db=typeof CARD_DATABASE!=='undefined'?CARD_DATABASE:{};const ai=LS('sl_ai_'+id)||[];const all=[...(db[id]||[]),...ai];const f=all.filter(c=>c.level===l);return shuffle(f.length?[...f]:[...all])}
function totalC(id){const db=typeof CARD_DATABASE!=='undefined'?CARD_DATABASE:{};return(db[id]||[]).length+(LS('sl_ai_'+id)||[]).length}

function Card({card:c,difficulty:d,category:cat,isActive:a,allCats:ac}){
  const[show,setShow]=useState(false);const df=DIFF[d-1]||DIFF[0];const ct=(ac||DEF_CATS).find(x=>x.id===cat);
  if(!c)return null;
  const tog=ev=>{ev.stopPropagation();ev.preventDefault();setShow(v=>!v)};
  return h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:'70px 20px 120px',opacity:a?1:0,pointerEvents:a?'auto':'none',transition:'opacity 0.3s',overflowY:'auto',WebkitOverflowScrolling:'touch'}},
    h('div',{style:{display:'flex',gap:8,marginBottom:20,flexShrink:0}},
      h('span',{style:{background:df.color+'22',color:df.color,padding:'4px 12px',borderRadius:20,fontSize:12,fontFamily:"'DM Mono',monospace",border:'1px solid '+df.color+'33'}},df.label),
      h('span',{style:{background:'rgba(255,255,255,0.06)',color:'rgba(255,255,255,0.5)',padding:'4px 12px',borderRadius:20,fontSize:12,fontFamily:"'DM Mono',monospace",display:'flex',alignItems:'center',gap:6}},ct?.icon?h('img',{src:ct.icon,style:{width:16,height:16}}):h('span',null,ct?.emoji||'\uD83D\uDCDA'),ct?.label)),
    h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:c.title?.length>20?26:34,fontWeight:400,textAlign:'center',lineHeight:1.2,margin:'0 0 8px',maxWidth:340}},c.title),
    h('p',{style:{fontFamily:"'DM Mono',monospace",fontSize:13,color:'rgba(255,255,255,0.35)',margin:'0 0 24px',textAlign:'center',letterSpacing:1,textTransform:'uppercase'}},c.subtitle),
    h('p',{style:{fontSize:16,color:'rgba(255,255,255,0.75)',lineHeight:1.65,textAlign:'center',maxWidth:320,margin:'0 0 20px'}},c.body),
    c.example&&h('div',{style:{width:'100%',maxWidth:340},onTouchEnd:ev=>ev.stopPropagation()},
      h('button',{onClick:tog,onTouchEnd:ev=>{ev.stopPropagation();tog(ev)},style:{background:show?'rgba(255,255,255,0.05)':'none',border:'1px solid rgba(255,255,255,'+(show?'0.2':'0.12')+')',color:'rgba(255,255,255,0.6)',padding:'10px 16px',borderRadius:8,fontSize:13,cursor:'pointer',fontFamily:"'DM Mono',monospace",width:'100%'}},show?'\u25BE Скрыть':'\u25B8 Показать пример'),
      show&&h('pre',{style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,padding:14,marginTop:8,fontSize:13,color:'#4ade80',fontFamily:"'DM Mono',monospace",whiteSpace:'pre-wrap',wordBreak:'break-word',lineHeight:1.5,maxHeight:200,overflow:'auto'}},c.example)),
    c.tip&&h('div',{style:{marginTop:16,padding:'12px 16px',background:'rgba(255,255,255,0.03)',borderLeft:'2px solid '+df.color+'44',borderRadius:'0 8px 8px 0',maxWidth:340,width:'100%'}},
      h('p',{style:{margin:0,fontSize:13,color:'rgba(255,255,255,0.5)',lineHeight:1.5}},'\uD83D\uDCA1 '+c.tip)))
}

function BMCard({b,ac}){const[o,setO]=useState(false);const ct=(ac||DEF_CATS).find(x=>x.id===b.category);const df=DIFF[(b.difficulty||1)-1];
  return h('div',{onClick:()=>setO(!o),style:{background:'rgba(255,255,255,0.03)',borderRadius:12,padding:16,marginBottom:10,border:'1px solid rgba(255,255,255,'+(o?'0.14':'0.06')+')',cursor:'pointer'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},h('h3',{style:{fontFamily:"'Playfair Display',serif",fontWeight:400,margin:0,fontSize:17,flex:1}},b.title),h('span',{style:{fontSize:12,color:'rgba(255,255,255,0.2)',marginLeft:8}},o?'\u25BE':'\u25B8')),
    h('div',{style:{display:'flex',gap:6,marginTop:6}},h('span',{style:{fontSize:10,color:df?.color,fontFamily:"'DM Mono',monospace",background:df?.color+'15',padding:'2px 8px',borderRadius:8}},df?.label),h('span',{style:{fontSize:10,color:'rgba(255,255,255,0.3)',fontFamily:"'DM Mono',monospace"}},b.subtitle||'')),
    o&&h('div',{style:{marginTop:12,borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:12}},
      h('p',{style:{fontSize:14,color:'rgba(255,255,255,0.6)',lineHeight:1.6,margin:'0 0 10px'}},b.body),
      b.example&&h('pre',{style:{background:'rgba(255,255,255,0.04)',borderRadius:8,padding:12,fontSize:12,color:'#4ade80',fontFamily:"'DM Mono',monospace",whiteSpace:'pre-wrap',wordBreak:'break-word',lineHeight:1.4,margin:'0 0 10px'}},b.example),
      b.tip&&h('p',{style:{fontSize:12,color:'rgba(255,255,255,0.4)',lineHeight:1.5}},'\uD83D\uDCA1 '+b.tip)))}

function App(){
  const[scr,setScr]=useState('menu');
  const[cat,setCat]=useState(null);
  const[dif,setDif]=useState(1);
  const[cards,setCards]=useState([]);
  const[idx,setIdx]=useState(0);
  const[ld,setLd]=useState(false);
  const[bm,setBM]=useState(()=>LS('sl_bm')||[]);
  const[apiKey,setAK]=useState(getKey);
  const[showKey,setShowKey]=useState(false);
  const[cc,setCC]=useState(()=>LS('sl_cc')||[]);
  const[gCats,setGC]=useState([]);
  const[gN,setGN]=useState(5);
  const[gL,setGL]=useState(0);
  const[gP,setGP]=useState(null);
  const[nL,setNL]=useState('');
  const[nD,setND]=useState('');
  const[nE,setNE]=useState('\uD83D\uDCDA');
  const tc=useRef({y:0,x:0,t:0}),lr=useRef(false),wr=useRef(null);
  const ac=[...DEF_CATS,...cc];
  const grp=[{label:'Технологии',type:'tech'},{label:'Языки',type:'lang'},{label:'Финансы',type:'finance'},...(cc.length?[{label:'Свои темы',type:'custom'}]:[])];

  useEffect(()=>{LS('sl_bm',bm)},[bm]);
  useEffect(()=>{LS('sl_cc',cc)},[cc]);

  const ldL=useCallback((id,l)=>{setCards(getLocal(id,l));setIdx(0)},[]);
  const ldM=useCallback(async(id,l,n=2)=>{if(lr.current||!getKey())return;lr.current=true;setLd(true);const rs=await Promise.all(Array.from({length:n},()=>fetchCard(id,l,cc)));const v=rs.filter(Boolean);if(v.length){setCards(p=>[...p,...v]);const ex=LS('sl_ai_'+id)||[];LS('sl_ai_'+id,[...ex,...v.map(c=>({...c,level:l}))])}setLd(false);lr.current=false},[cc]);

  useEffect(()=>{if(scr==='feed'&&cat&&cards.length===0)ldL(cat,dif)},[scr,cat,dif,cards.length,ldL]);
  useEffect(()=>{if(scr==='feed'&&getKey()&&cards.length>0&&idx>=cards.length-2)ldM(cat,dif)},[idx,cards.length,scr,cat,dif,ldM]);

  const onTS=e=>{tc.current={y:e.touches[0].clientY,x:e.touches[0].clientX,t:Date.now()}};
  const onTE=e=>{if(Date.now()-tc.current.t<50)return;const dy=tc.current.y-e.changedTouches[0].clientY,dx=Math.abs(tc.current.x-e.changedTouches[0].clientX);if(Math.abs(dy)>50&&Math.abs(dy)>dx*1.5){dy>0&&idx<cards.length-1&&setIdx(i=>i+1);dy<0&&idx>0&&setIdx(i=>i-1)}};
  const onWh=e=>{if(wr.current)return;wr.current=setTimeout(()=>{wr.current=null},400);e.deltaY>30&&idx<cards.length-1&&setIdx(i=>i+1);e.deltaY<-30&&idx>0&&setIdx(i=>i-1)};
  useEffect(()=>{const fn=e=>{if(scr!=='feed')return;e.key==='ArrowDown'&&idx<cards.length-1&&setIdx(i=>i+1);e.key==='ArrowUp'&&idx>0&&setIdx(i=>i-1);e.key==='Escape'&&(setScr('menu'),setCards([]))};addEventListener('keydown',fn);return()=>removeEventListener('keydown',fn)},[scr,idx,cards.length]);

  const tBM=()=>{const c=cards[idx];if(!c)return;setBM(p=>{const ex=p.find(b=>b.title===c.title&&b.category===cat);return ex?p.filter(b=>!(b.title===c.title&&b.category===cat)):[...p,{...c,category:cat,difficulty:dif}]})};
  const iB=cards[idx]&&bm.find(b=>b.title===cards[idx]?.title&&b.category===cat);
  const cD=d=>{setDif(v=>{const n=v+d;return n<1||n>5?v:n});setCards([]);setIdx(0)};
  const hK=v=>{setAK(v);setKey(v)};
  const startF=id=>{setCat(id);setCards([]);setIdx(0);setScr('feed')};

  const runGen=async()=>{if(!getKey()||!gCats.length)return;const lvs=gL===0?[1,2,3,4,5]:[gL];const tot=gCats.length*gN;let dn=0;setGP({d:0,t:tot,c:''});for(const cid of gCats){const ct=ac.find(x=>x.id===cid);for(let i=0;i<gN;i++){const l=lvs[i%lvs.length];setGP({d:dn,t:tot,c:ct?.label||cid});const card=await fetchCard(cid,l,cc);if(card){const ex=LS('sl_ai_'+cid)||[];LS('sl_ai_'+cid,[...ex,{...card,level:l}])}dn++;setGP({d:dn,t:tot,c:ct?.label||cid})}}setGP(null);alert('Готово! '+dn+' карточек.')};
  const addT=()=>{if(!nL.trim())return;setCC(p=>[...p,{id:'c_'+Date.now(),label:nL.trim(),sublabel:nD.trim()||'Пользовательская тема',type:'custom',emoji:nE,icon:null}]);setNL('');setND('');setNE('\uD83D\uDCDA');setScr('menu')};

  /* ═══ BOOKMARKS ═══ */
  if(scr==='bookmarks'){const g={};bm.forEach(b=>{if(!g[b.category])g[b.category]=[];g[b.category].push(b)});
    return h('div',{style:{minHeight:'100vh',background:'#0a0a0a',color:'#fff',paddingBottom:40,overflowY:'auto',WebkitOverflowScrolling:'touch'}},
      h('div',{style:{padding:'calc('+ST+'+8px) 20px 20px',display:'flex',alignItems:'center',gap:12}},
        h('button',{onClick:()=>setScr('menu'),style:{background:'rgba(255,255,255,0.06)',border:'none',color:'#fff',width:40,height:40,borderRadius:12,fontSize:18,cursor:'pointer'}},'\u2190'),
        h('h2',{style:{fontFamily:"'Playfair Display',serif",fontWeight:400,margin:0,fontSize:24}},'\uD83D\uDD16 Закладки'),
        h('span',{style:{fontSize:13,color:'rgba(255,255,255,0.3)',fontFamily:"'DM Mono',monospace",marginLeft:'auto'}},bm.length)),
      h('div',{style:{padding:'0 20px'}},
        !Object.keys(g).length&&h('p',{style:{color:'rgba(255,255,255,0.3)',textAlign:'center',marginTop:60}},'Пока пусто. Нажмите \uD83C\uDFF7\uFE0F в ленте.'),
        Object.keys(g).map(cid=>{const ct=ac.find(x=>x.id===cid);return h('div',{key:cid,style:{marginBottom:24}},
          h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
            ct?.icon?h('img',{src:ct.icon,style:{width:20,height:20}}):h('span',null,ct?.emoji||'\uD83D\uDCDA'),
            h('span',{style:{fontSize:13,color:'rgba(255,255,255,0.5)',fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:1}},ct?.label||cid),
            h('span',{style:{fontSize:11,color:'rgba(255,255,255,0.2)',fontFamily:"'DM Mono',monospace",marginLeft:4}},g[cid].length)),
          g[cid].map((b,i)=>h(BMCard,{key:i,b,ac})))})))}

  /* ═══ GENERATE ═══ */
  if(scr==='generate'){return h('div',{style:{minHeight:'100vh',background:'#0a0a0a',color:'#fff',paddingBottom:40,overflowY:'auto',WebkitOverflowScrolling:'touch'}},
    h('div',{style:{padding:'calc('+ST+'+8px) 20px 16px',display:'flex',alignItems:'center',gap:12}},
      h('button',{onClick:()=>{setGP(null);setScr('menu')},style:{background:'rgba(255,255,255,0.06)',border:'none',color:'#fff',width:40,height:40,borderRadius:12,fontSize:18,cursor:'pointer'}},'\u2190'),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontWeight:400,margin:0,fontSize:22}},'\uD83E\uDD16 AI Генерация')),
    h('div',{style:{padding:'0 20px'}},
      !apiKey&&h('div',{style:{padding:16,borderRadius:12,background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.2)',marginBottom:16}},
        h('p',{style:{fontSize:13,color:'#ef4444',margin:'0 0 8px'}},'Нужен API ключ'),
        h('input',{type:'password',value:apiKey,onChange:e=>hK(e.target.value),placeholder:'sk-ant-api03-...',style:{width:'100%',fontFamily:"'DM Mono',monospace"}})),
      h('p',{style:{fontSize:11,color:'rgba(255,255,255,0.3)',fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:1.5,margin:'0 0 10px'}},'Темы'),
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}},
        ac.map(c=>{const s=gCats.includes(c.id);return h('button',{key:c.id,onClick:()=>setGC(p=>s?p.filter(x=>x!==c.id):[...p,c.id]),style:{padding:'8px 14px',borderRadius:10,background:s?'rgba(74,222,128,0.12)':'rgba(255,255,255,0.03)',border:'1px solid '+(s?'rgba(74,222,128,0.3)':'rgba(255,255,255,0.06)'),color:s?'#4ade80':'rgba(255,255,255,0.5)',fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},c.icon?h('img',{src:c.icon,style:{width:16,height:16}}):h('span',{style:{fontSize:14}},c.emoji||'\uD83D\uDCDA'),c.label)}),
        h('button',{onClick:()=>setGC(gCats.length===ac.length?[]:ac.map(c=>c.id)),style:{padding:'8px 14px',borderRadius:10,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.3)',fontSize:12,cursor:'pointer',fontFamily:"'DM Mono',monospace"}},gCats.length===ac.length?'Снять':'Все')),
      h('p',{style:{fontSize:11,color:'rgba(255,255,255,0.3)',fontFamily:"'DM Mono',monospace",textTransform:'uppercase',letterSpacing:1.5,margin:'0 0 10px'}},'Карточек на тему'),
