/* ─── Storage ─── */
function LS(k,v){try{if(v===undefined){const r=localStorage.getItem(k);return r?JSON.parse(r):null}localStorage.setItem(k,JSON.stringify(v))}catch{return null}}
function gK(){try{return localStorage.getItem('sl_api')||''}catch{return''}}
function sK(k){try{localStorage.setItem('sl_api',k)}catch{}}

/* ─── SM-2 Spaced Repetition ─── */
function sm2(card,quality){// quality: 0-5, >=3 = remembered
  const c={...card};
  if(!c.ease)c.ease=2.5;if(!c.reps)c.reps=0;if(!c.interval)c.interval=0;
  if(quality>=3){
    c.reps++;
    if(c.reps===1)c.interval=1;
    else if(c.reps===2)c.interval=6;
    else c.interval=Math.round(c.interval*c.ease);
    c.ease=Math.max(1.3,c.ease+0.1-(5-quality)*(0.08+(5-quality)*0.02));
  }else{c.reps=0;c.interval=1;c.ease=Math.max(1.3,c.ease-0.2)}
  c.nextReview=Date.now()+c.interval*86400000;
  c.lastReview=Date.now();
  return c;
}
function getSRCards(catId){return LS('sl_sr_'+catId)||{}}
function saveSR(catId,data){LS('sl_sr_'+catId,data)}
function getDueCards(catId){
  const sr=getSRCards(catId);const now=Date.now();
  return Object.entries(sr).filter(([_,c])=>!c.nextReview||c.nextReview<=now).map(([k,c])=>({...c,_key:k}));
}
function getNewForSR(catId,level,count){
  const sr=getSRCards(catId);const db=typeof CARD_DATABASE!=='undefined'?CARD_DATABASE:{};
  const ai=LS('sl_ai_'+catId)||[];const all=[...(db[catId]||[]),...ai];
  const filtered=level?all.filter(c=>c.level===level):all;
  return filtered.filter(c=>!sr[c.title]).slice(0,count);
}

/* ─── Streak & Stats ─── */
function todayKey(){return new Date().toISOString().slice(0,10)}
function recordStudy(n){const stats=LS('sl_stats')||{};const k=todayKey();stats[k]=(stats[k]||0)+n;LS('sl_stats',stats)}
function getStats(){return LS('sl_stats')||{}}
function getStreak(){const s=getStats();let streak=0;const d=new Date();for(let i=0;i<365;i++){const k=d.toISOString().slice(0,10);if(s[k]&&s[k]>0)streak++;else if(i>0)break;d.setDate(d.getDate()-1)}return streak}
function getWeekData(){const s=getStats();const r=[];const d=new Date();for(let i=6;i>=0;i--){const dd=new Date(d);dd.setDate(dd.getDate()-i);const k=dd.toISOString().slice(0,10);r.push({day:dd.toLocaleDateString('ru',{weekday:'short'}),count:s[k]||0})}return r}

const DAYS_RU=['\u041F\u043D','\u0412\u0442','\u0421\u0440','\u0427\u0442','\u041F\u0442','\u0421\u0431','\u0412\u0441'];

});

function gPr(id,l,cc,ex){let b=DP[id]?DP[id](l):null;if(!b){const c=(cc||[]).find(x=>x.id===id);if(c)b=`\u042D\u043A\u0441\u043F\u0435\u0440\u0442 "${c.label}". ${c.sublabel}. \u041A\u0430\u0440\u0442\u043E\u0447\u043A\u0430 ${l}/5. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`;else return null}if(ex?.length){b+='\n\u041D\u0415 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0439: '+ex.slice(-20).map(c=>c.title).join(', ')}return b}
function pC(t){try{return JSON.parse(t.replace(/```json\s*/g,'').replace(/```/g,'').trim())}catch{const m=t.match(/\{[\s\S]*\}/);if(m)try{return JSON.parse(m[0])}catch{}return null}}
async function fC(id,l,cc,ex){const p=gPr(id,l,cc,ex);if(!p)return null;const k=gK();if(!k)return null;try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:p}]})});const d=await r.json();if(d.error)throw Error(d.error.message);return pC(d.content?.map(b=>b.text||'').join('')||'')}catch(e){console.error(e);return null}}
async function aiExplain(card){const k=gK();if(!k)return'\u041D\u0443\u0436\u0435\u043D API \u043A\u043B\u044E\u0447';try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,messages:[{role:'user',content:`\u041E\u0431\u044A\u044F\u0441\u043D\u0438 \u043F\u0440\u043E\u0441\u0442\u044B\u043C \u044F\u0437\u044B\u043A\u043E\u043C \u043D\u0430 \u0420\u0423\u0421\u0421\u041A\u041E\u041C, \u043A\u0430\u043A \u0431\u0443\u0434\u0442\u043E \u044F \u043D\u043E\u0432\u0438\u0447\u043E\u043A:\n\n\u0422\u0435\u043C\u0430: ${card.title}\n${card.body}\n\n\u0414\u0430\u0439 3-4 \u043F\u0440\u043E\u0441\u0442\u044B\u0445 \u043F\u0440\u0438\u043C\u0435\u0440\u0430, \u0430\u043D\u0430\u043B\u043E\u0433\u0438\u044E \u0438\u0437 \u0436\u0438\u0437\u043D\u0438 \u0438 \u043F\u043E\u0448\u0430\u0433\u043E\u0432\u043E\u0435 \u043E\u0431\u044A\u044F\u0441\u043D\u0435\u043D\u0438\u0435.`}]})});const d=await r.json();return d.content?.map(b=>b.text||'').join('')||'\u041E\u0448\u0438\u0431\u043A\u0430'}catch(e){return'\u041E\u0448\u0438\u0431\u043A\u0430: '+e.message}}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function allCards(id){const db=typeof CARD_DATABASE!=='undefined'?CARD_DATABASE:{};return[...(db[id]||[]),...(LS('sl_ai_'+id)||[])]}
function getCards(id,l){const a=allCards(id);const f=a.filter(c=>c.level===l);return shuffle(f.length?f:a)}
function totalC(id){return allCards(id).length}
function isDupe(c,ex){return ex.some(e=>e.title===c.title)}

/* ═══ Card Component ═══ */
function CardView({card:c,difficulty:d,category:cat,isActive:a,allCats:ac,onExplain}){
  const[sh,setSh]=useState(false);const[exp,setExp]=useState(null);const[expLd,setEL]=useState(false);
  const df=DL[d-1]||DL[0];const ct=(ac||DC).find(x=>x.id===cat);

  const tog=ev=>{ev.stopPropagation();ev.preventDefault();setSh(v=>!v)};
  const doExplain=async(ev)=>{ev.stopPropagation();if(exp)return setExp(null);setEL(true);const r=await aiExplain(c);setExp(r);setEL(false)};
  return h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:'70px 20px 130px',opacity:a?1:0,pointerEvents:a?'auto':'none',transition:'opacity 0.3s',overflowY:'auto',WebkitOverflowScrolling:'touch'}},
    h('div',{style:{display:'flex',gap:8,marginBottom:20,flexShrink:0}},
      h('span',{style:{background:df.color+'22',color:df.color,padding:'4px 12px',borderRadius:20,fontSize:12,fontFamily:"'DM Mono',monospace",border:'1px solid '+df.color+'33'}},df.label),
      h('span',{style:{background:'var(--card)',color:'var(--muted)',padding:'4px 12px',borderRadius:20,fontSize:12,fontFamily:"'DM Mono',monospace",display:'flex',alignItems:'center',gap:6}},ct?.icon?h('img',{src:ct.icon,style:{width:16,height:16}}):h('span',null,ct?.emoji||'\uD83D\uDCDA'),ct?.label)),
    h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:c.title?.length>20?26:34,fontWeight:400,textAlign:'center',lineHeight:1.2,margin:'0 0 8px',maxWidth:340}},c.title),
    h('p',{style:{fontFamily:"'DM Mono',monospace",fontSize:13,color:'var(--muted)',margin:'0 0 24px',textAlign:'center',letterSpacing:1,textTransform:'uppercase'}},c.subtitle),
    h('p',{style:{fontSize:16,color:'var(--text)',lineHeight:1.65,textAlign:'center',maxWidth:320,margin:'0 0 16px'}},c.body),
    // Example
    c.example&&h('div',{style:{width:'100%',maxWidth:340},onTouchEnd:ev=>ev.stopPropagation()},

    h('div',{style:{display:'flex',alignItems:'center',gap:6,background:'var(--card)',padding:'8px 14px',borderRadius:12,border:'1px solid var(--border)'}},
