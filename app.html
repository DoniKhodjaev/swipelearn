<style>

<body>
<div id="root"></div>

<script>
'use strict';
const h=React.createElement,{useState,useEffect,useRef,useCallback}=React;
const SB='env(safe-area-inset-bottom,12px)';

/* Storage */
function LS(k,v){try{if(v===undefined){const r=localStorage.getItem(k);return r?JSON.parse(r):null}localStorage.setItem(k,JSON.stringify(v))}catch{return null}}
function gK(){try{return localStorage.getItem('sl_api')||''}catch{return''}}
function sK(k){try{localStorage.setItem('sl_api',k)}catch{}}

/* Share */
async function shareApp(){const u=location.href.replace(/app\.html.*/,'');if(navigator.share)try{await navigator.share({title:'SwipeLearn',text:'Учись листая! Карточки по Excel, VBA, языкам и финансам.',url:u});return}catch{}if(navigator.clipboard){await navigator.clipboard.writeText(u);alert('Ссылка скопирована!')}else prompt('Скопируйте:',u)}
async function shareCard(card,catLabel){
  const text=`📚 ${card.title}\n${card.subtitle}\n\n${card.body}${card.example?'\n\n💻 '+card.example:''}${card.tip?'\n\n💡 '+card.tip:''}\n\n— ${catLabel} · SwipeLearn`;
  if(navigator.share)try{await navigator.share({title:card.title,text});return}catch{}
  if(navigator.clipboard){await navigator.clipboard.writeText(text);alert('Карточка скопирована!')}else prompt('Скопируйте:',text)
}

/* Data */
const DC=[
  {id:"excel",label:"Excel",sublabel:"Формулы, функции, лайфхаки",type:"tech",icon:"icons/excel.svg"},
  {id:"vba",label:"VBA",sublabel:"Макросы и автоматизация",type:"tech",icon:"icons/vba.svg"},
  {id:"addin",label:"Add-In",sublabel:"Надстройки Excel/Office",type:"tech",icon:"icons/addin.svg"},
  {id:"german",label:"Deutsch",sublabel:"Словарь и грамматика",type:"lang",icon:"icons/german.svg"},
  {id:"english",label:"English",sublabel:"Vocabulary & Grammar",type:"lang",icon:"icons/english.svg"},
  {id:"japanese",label:"\u65E5\u672C\u8A9E",sublabel:"Словарь и грамматика",type:"lang",icon:"icons/japanese.svg"},
  {id:"ib",label:"Investment Banking",sublabel:"IB знания и термины",type:"finance",icon:"icons/ib.svg"},
  {id:"pe",label:"Private Equity",sublabel:"PE фонды и стратегии",type:"finance",icon:"icons/pe.svg"},
  {id:"cb",label:"Commercial Banking",sublabel:"Банковское дело",type:"finance",icon:"icons/cb.svg"},
];
const DL=[{id:1,label:"\u041D\u0430\u0447\u0430\u043B\u044C\u043D\u044B\u0439",color:"#4ade80"},{id:2,label:"\u0411\u0430\u0437\u043E\u0432\u044B\u0439",color:"#60a5fa"},{id:3,label:"\u0421\u0440\u0435\u0434\u043D\u0438\u0439",color:"#f59e0b"},{id:4,label:"\u041F\u0440\u043E\u0434\u0432\u0438\u043D\u0443\u0442\u044B\u0439",color:"#f97316"},{id:5,label:"\u042D\u043A\u0441\u043F\u0435\u0440\u0442\u043D\u044B\u0439",color:"#ef4444"}];
const DP={excel:l=>`Преподаватель Excel. Уникальная карточка ${l}/5 на РУССКОМ. НЕ повторяй: ВПР, СУММ, ЕСЛИ. Ответь JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,vba:l=>`Преподаватель VBA. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,addin:l=>`Эксперт надстроек Excel. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,german:l=>`Преподаватель немецкого. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,english:l=>`Преподаватель английского. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,japanese:l=>`Преподаватель японского. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,ib:l=>`Инвестбанкир. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,pe:l=>`Специалист PE. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`,cb:l=>`Эксперт Commercial Banking. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`};

function gPr(id,l,cc,existing){
  let base=DP[id]?DP[id](l):null;
  if(!base){const c=(cc||[]).find(x=>x.id===id);if(c)base=`Эксперт "${c.label}". ${c.sublabel}. Уникальная карточка ${l}/5 на РУССКОМ. JSON:{"title":"","subtitle":"","body":"","example":"","tip":""}`;else return null}
  // Add existing titles to avoid dupes
  if(existing&&existing.length>0){const titles=existing.slice(-30).map(c=>c.title).join(', ');base+=`\nНЕ используй эти темы (уже были): ${titles}`}
  return base;
}
function pC(t){try{return JSON.parse(t.replace(/```json\s*/g,'').replace(/```/g,'').trim())}catch{const m=t.match(/\{[\s\S]*\}/);if(m)try{return JSON.parse(m[0])}catch{}return null}}

async function fC(id,l,cc,existing){
  const p=gPr(id,l,cc,existing);if(!p)return null;const k=gK();if(!k)return null;
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:p}]})});const d=await r.json();if(d.error)throw Error(d.error.message);return pC(d.content?.map(b=>b.text||'').join('')||'')}catch(e){console.error('API:',e);return null}
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function allCards(id){const db=typeof CARD_DATABASE!=='undefined'?CARD_DATABASE:{};return[...(db[id]||[]),...(LS('sl_ai_'+id)||[])]}
function getCards(id,l){const a=allCards(id);const f=a.filter(c=>c.level===l);return shuffle(f.length?f:a)}
function totalC(id){return allCards(id).length}
function isDupe(card,existing){return existing.some(e=>e.title===card.title)}

/* ═══ Card ═══ */
function Card({card:c,difficulty:d,category:cat,isActive:a,allCats:ac,onShare}){
  const[sh,setSh]=useState(false);const df=DL[d-1]||DL[0];const ct=(ac||DC).find(x=>x.id===cat);
  if(!c)return null;
  const tog=ev=>{ev.stopPropagation();ev.preventDefault();setSh(v=>!v)};
  return h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:'70px 20px 120px',opacity:a?1:0,pointerEvents:a?'auto':'none',transition:'opacity 0.3s',overflowY:'auto',WebkitOverflowScrolling:'touch'}},
    h('div',{style:{display:'flex',gap:8,marginBottom:20,flexShrink:0}},
      h('span',{style:{background:df.color+'22',color:df.color,padding:'4px 12px',borderRadius:20,fontSize:12,fontFamily:"'DM Mono',monospace",border:'1px solid '+df.color+'33'}},df.label),
      h('span',{style:{background:'rgba(255,255,255,0.06)',color:'rgba(255,255,255,0.5)',padding:'4px 12px',borderRadius:20,fontSize:12,fontFamily:"'DM Mono',monospace",display:'flex',alignItems:'center',gap:6}},ct?.icon?h('img',{src:ct.icon,style:{width:16,height:16}}):h('span',null,ct?.emoji||'\uD83D\uDCDA'),ct?.label)),
    h('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:c.title?.length>20?26:34,fontWeight:400,textAlign:'center',lineHeight:1.2,margin:'0 0 8px',maxWidth:340}},c.title),
    h('p',{style:{fontFamily:"'DM Mono',monospace",fontSize:13,color:'rgba(255,255,255,0.35)',margin:'0 0 24px',textAlign:'center',letterSpacing:1,textTransform:'uppercase'}},c.subtitle),
    h('p',{style:{fontSize:16,color:'rgba(255,255,255,0.75)',lineHeight:1.65,textAlign:'center',maxWidth:320,margin:'0 0 20px'}},c.body),
    c.example&&h('div',{style:{width:'100%',maxWidth:340},onTouchEnd:ev=>ev.stopPropagation()},
      h('button',{onClick:tog,onTouchEnd:ev=>{ev.stopPropagation();tog(ev)},style:{background:sh?'rgba(255,255,255,0.05)':'none',border:'1px solid rgba(255,255,255,'+(sh?'0.2':'0.12')+')',color:'rgba(255,255,255,0.6)',padding:'10px 16px',borderRadius:8,fontSize:13,cursor:'pointer',fontFamily:"'DM Mono',monospace",width:'100%'}},sh?'\u25BE \u0421\u043A\u0440\u044B\u0442\u044C':'\u25B8 \u041F\u043E\u043A\u0430\u0437\u0430\u0442\u044C \u043F\u0440\u0438\u043C\u0435\u0440'),
      sh&&h('pre',{style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,padding:14,marginTop:8,fontSize:13,color:'#4ade80',fontFamily:"'DM Mono',monospace",whiteSpace:'pre-wrap',wordBreak:'break-word',lineHeight:1.5,maxHeight:200,overflow:'auto'}},c.example)),
    c.tip&&h('div',{style:{marginTop:16,padding:'12px 16px',background:'rgba(255,255,255,0.03)',borderLeft:'2px solid '+df.color+'44',borderRadius:'0 8px 8px 0',maxWidth:340,width:'100%'}},
      h('p',{style:{margin:0,fontSize:13,color:'rgba(255,255,255,0.5)',lineHeight:1.5}},'\uD83D\uDCA1 '+c.tip)))
}

/* ═══ BookmarkCard ═══ */
function BMC({b,ac}){const[o,setO]=useState(false);const ct=(ac||DC).find(x=>x.id===b.category);const df=DL[(b.difficulty||1)-1];
  return h('div',{style:{background:'rgba(255,255,255,0.03)',borderRadius:12,padding:16,marginBottom:10,border:'1px solid rgba(255,255,255,'+(o?'0.14':'0.06')+')',cursor:'pointer'}},
    h('div',{onClick:()=>setO(!o),style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},h('h3',{style:{fontFamily:"'Playfair Display',serif",fontWeight:400,margin:0,fontSize:17,flex:1}},b.title),h('span',{style:{fontSize:12,color:'rgba(255,255,255,0.2)',marginLeft:8}},o?'\u25BE':'\u25B8')),
    h('div',{style:{display:'flex',gap:6,marginTop:6}},h('span',{style:{fontSize:10,color:df?.color,fontFamily:"'DM Mono',monospace",background:df?.color+'15',padding:'2px 8px',borderRadius:8}},df?.label),h('span',{style:{fontSize:10,color:'rgba(255,255,255,0.3)',fontFamily:"'DM Mono',monospace"}},b.subtitle||'')),
    o&&h('div',{style:{marginTop:12,borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:12}},
      h('p',{style:{fontSize:14,color:'rgba(255,255,255,0.6)',lineHeight:1.6,margin:'0 0 10px'}},b.body),
      b.example&&h('pre',{style:{background:'rgba(255,255,255,0.04)',borderRadius:8,padding:12,fontSize:12,color:'#4ade80',fontFamily:"'DM Mono',monospace",whiteSpace:'pre-wrap',wordBreak:'break-word',lineHeight:1.4,margin:'0 0 10px'}},b.example),
      b.tip&&h('p',{style:{fontSize:12,color:'rgba(255,255,255,0.4)',lineHeight:1.5,margin:'0 0 10px'}},'\uD83D\uDCA1 '+b.tip),
      h('button',{onClick:ev=>{ev.stopPropagation();shareCard(b,ct?.label||'')},style:{background:'rgba(255,255,255,0.06)',border:'none',color:'rgba(255,255,255,0.4)',padding:'6px 14px',borderRadius:8,fontSize:12,cursor:'pointer'}},'\uD83D\uDCE4 \u041F\u043E\u0434\u0435\u043B\u0438\u0442\u044C\u0441\u044F')))}

/* ═══ App ═══ */
function App(){
  const[scr,setScr]=useState('menu');
  const[cat,setCat]=useState(null);
  const[dif,setDif]=useState(1);
  const[cards,setCards]=useState([]);
  const[idx,setIdx]=useState(0);
  const[ld,setLd]=useState(false);
  const[bm,setBM]=useState(()=>LS('sl_bm')||[]);
  const[ak,setAK]=useState(gK);
  const[showK,setSK]=useState(false);
  const[cc,setCC]=useState(()=>LS('sl_cc')||[]);
  /* Generate */
  const[gC,setGC]=useState([]);
  const[gN,setGN]=useState(5);
  const[gPerLvl,setGPL]=useState(false);
  const[gP,setGP]=useState(null);
  /* Add topic */
  const[nL,setNL]=useState('');const[nD,setND]=useState('');const[nE,setNE]=useState('\uD83D\uDCDA');
  /* Learning mode */
  const[lm,setLM]=useState(false);
  const[lmProg,setLMP]=useState(()=>LS('sl_lm_prog')||{});
  const[lmRevealed,setLMR]=useState(false);

  const tc=useRef({y:0,x:0,t:0}),lr=useRef(false),wr=useRef(null);
  const ac=[...DC,...cc];
  const grp=[{l:'\u0422\u0435\u0445\u043D\u043E\u043B\u043E\u0433\u0438\u0438',t:'tech'},{l:'\u042F\u0437\u044B\u043A\u0438',t:'lang'},{l:'\u0424\u0438\u043D\u0430\u043D\u0441\u044B',t:'finance'},...(cc.length?[{l:'\u0421\u0432\u043E\u0438 \u0442\u0435\u043C\u044B',t:'custom'}]:[])];

  useEffect(()=>{LS('sl_bm',bm)},[bm]);
  useEffect(()=>{LS('sl_cc',cc)},[cc]);
  useEffect(()=>{LS('sl_lm_prog',lmProg)},[lmProg]);

  const ldL=useCallback((id,l)=>{const c=getCards(id,l);setCards(c);setIdx(0);setLMR(false)},[]);
  const ldM=useCallback(async(id,l,n=2)=>{if(lr.current||!gK())return;lr.current=true;setLd(true);const ex=allCards(id);const results=[];for(let i=0;i<n;i++){const c=await fC(id,l,cc,ex.concat(results));if(c&&!isDupe(c,ex.concat(results)))results.push(c)}if(results.length){setCards(p=>[...p,...results]);const prev=LS('sl_ai_'+id)||[];LS('sl_ai_'+id,[...prev,...results.map(c=>({...c,level:l}))])}setLd(false);lr.current=false},[cc]);

  useEffect(()=>{if(scr==='feed'&&cat&&cards.length===0)ldL(cat,dif)},[scr,cat,dif,cards.length,ldL]);
  useEffect(()=>{if(scr==='feed'&&!lm&&gK()&&cards.length>0&&idx>=cards.length-2)ldM(cat,dif)},[idx,cards.length,scr,cat,dif,ldM,lm]);

  const onTS=e=>{tc.current={y:e.touches[0].clientY,x:e.touches[0].clientX,t:Date.now()}};
  const onTE=e=>{if(Date.now()-tc.current.t<50)return;const dy=tc.current.y-e.changedTouches[0].clientY,dx=Math.abs(tc.current.x-e.changedTouches[0].clientX);if(Math.abs(dy)>50&&Math.abs(dy)>dx*1.5){if(lm&&!lmRevealed&&dy>0){setLMR(true);return}dy>0&&idx<cards.length-1&&(setIdx(i=>i+1),setLMR(false));dy<0&&idx>0&&(setIdx(i=>i-1),setLMR(false))}};
  const onWh=e=>{if(wr.current)return;wr.current=setTimeout(()=>{wr.current=null},400);if(lm&&!lmRevealed&&e.deltaY>30){setLMR(true);return}e.deltaY>30&&idx<cards.length-1&&(setIdx(i=>i+1),setLMR(false));e.deltaY<-30&&idx>0&&(setIdx(i=>i-1),setLMR(false))};
  useEffect(()=>{const fn=e=>{if(scr!=='feed')return;if(e.key===' '&&lm&&!lmRevealed){setLMR(true);e.preventDefault();return}if(e.key==='ArrowDown'||e.key===' '){if(idx<cards.length-1){setIdx(i=>i+1);setLMR(false)}}if(e.key==='ArrowUp'&&idx>0){setIdx(i=>i-1);setLMR(false)}if(e.key==='Escape'){setScr('menu');setCards([])}};addEventListener('keydown',fn);return()=>removeEventListener('keydown',fn)},[scr,idx,cards.length,lm,lmRevealed]);

  const tBM=()=>{const c=cards[idx];if(!c)return;setBM(p=>{const ex=p.find(b=>b.title===c.title&&b.category===cat);return ex?p.filter(b=>!(b.title===c.title&&b.category===cat)):[...p,{...c,category:cat,difficulty:dif}]})};
  const iB=cards[idx]&&bm.find(b=>b.title===cards[idx]?.title&&b.category===cat);
  const cD=d=>{setDif(v=>{const n=v+d;return n<1||n>5?v:n});setCards([]);setIdx(0)};
  const hK=v=>{setAK(v);sK(v)};
  const startF=(id,learn)=>{setCat(id);setCards([]);setIdx(0);setLM(!!learn);setLMR(false);setScr('feed')};

  // Learning mode: mark as learned
  const markLearned=()=>{const c=cards[idx];if(!c||!cat)return;const key=cat+'_'+dif;const prog={...lmProg};if(!prog[key])prog[key]=[];if(!prog[key].includes(c.title))prog[key]=[...prog[key],c.title];setLMP(prog);if(idx<cards.length-1){setIdx(i=>i+1);setLMR(false)}};
  const learnedCount=cat&&lmProg[cat+'_'+dif]?lmProg[cat+'_'+dif].length:0;

  /* Generate — with per-level support */
  const runGen=async()=>{if(!gK()||!gC.length)return;const levels=gPerLvl?[1,2,3,4,5]:[dif];const tot=gC.length*levels.length*gN;let dn=0;setGP({d:0,t:tot,c:''});
    for(const cid of gC){const ct=ac.find(x=>x.id===cid);
      for(const lvl of levels){
        const existing=allCards(cid);const batch=[];
        for(let i=0;i<gN;i++){
          setGP({d:dn,t:tot,c:(ct?.label||cid)+' L'+lvl});
          const card=await fC(cid,lvl,cc,existing.concat(batch));
          if(card&&!isDupe(card,existing.concat(batch))){batch.push({...card,level:lvl})}
          dn++;setGP({d:dn,t:tot,c:(ct?.label||cid)+' L'+lvl})}
        if(batch.length){const prev=LS('sl_ai_'+cid)||[];LS('sl_ai_'+cid,[...prev,...batch])}}}
    setGP(null);alert('\u0413\u043E\u0442\u043E\u0432\u043E! '+dn+' \u043A\u0430\u0440\u0442\u043E\u0447\u0435\u043A.')};

  const addT=()=>{if(!nL.trim())return;setCC(p=>[...p,{id:'c_'+Date.now(),label:nL.trim(),sublabel:nD.trim()||'',type:'custom',emoji:nE,icon:null}]);setNL('');setND('');setScr('menu')};

  /* ═══ BOOKMARKS ═══ */
  if(scr==='bookmarks'){const g={};bm.forEach(b=>{if(!g[b.category])g[b.category]=[];g[b.category].push(b)});
    return h('div',{style:{minHeight:'100vh',background:'#0a0a0a',paddingBottom:40,overflowY:'auto',WebkitOverflowScrolling:'touch'}},
      h('div',{className:'tp',style:{paddingLeft:20,paddingRight:20,paddingBottom:20,display:'flex',alignItems:'center',gap:12}},
        h('button',{onClick:()=>setScr('menu'),style:{background:'rgba(255,255,255,0.06)',border:'none',color:'#fff',width:40,height:40,borderRadius:12,fontSize:18,cursor:'pointer'}},'\u2190'),
        h('h2',{style:{fontFamily:"'Playfair Display',serif",fontWeight:400,margin:0,fontSize:24}},'\uD83D\uDD16 \u0417\u0430\u043A\u043B\u0430\u0434\u043A\u0438'),
